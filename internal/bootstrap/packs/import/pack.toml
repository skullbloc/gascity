# gc-import — source-based package manager for Gas City packs.
#
# Five verbs: add, remove, install, upgrade, list.
# Plus an implicit-imports feature: every city automatically gets the
# packs listed in ~/.gc/implicit-import.toml (one entry by default:
# maintenance) unless the city sets implicit_imports = false.
# No tap concept, no user-level registry, no third-party Python deps.
# See README.md for the user guide.
#
# Commands and the doctor check are convention-discovered from
# commands/<name>/ and doctor/<name>/ directories. Each command's
# command.toml sidecar points at the Python entrypoint (run = "<name>.py");
# the python3.11 doctor check uses run.sh per V2 convention.

[pack]
name = "import"
version = "0.2.0"
schema = 2
description = "Source-based package manager for Gas City packs (gc import add/remove/install/upgrade/list, plus implicit-imports splice from ~/.gc/implicit-import.toml)"
