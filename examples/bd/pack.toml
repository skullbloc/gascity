# BD — Dolt-backed beads provider pack.
#
# Ships the bd (beads) CLI integration with Dolt SQL server.
# Includes dolt-health for server lifecycle, health monitoring,
# and operational formulas.
#
# This pack is bundled with the gc binary and active by default.
# The SDK's default [beads].provider = "bd" relies on this pack's
# doctor checks and the dolt-health pack's server management.
#
# Future: this pack will ship a gc-beads-bd exec: provider script,
# and all dolt-specific code will move out of the gc binary.

[pack]
name = "bd"
schema = 1
includes = ["../dolt-health"]

[[doctor]]
name = "check-bd"
script = "doctor/check-bd.sh"
description = "Verify bd (beads) binary is available"
