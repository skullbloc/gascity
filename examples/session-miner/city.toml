# Minimal city for running the session-miner pack against a real corpus.
#
# Composes one rig (the directory where mining outputs land) with the
# session-miner pack. The rig can be any git repo; the pack writes its
# outputs under `<output_dir>` (configurable per invocation), defaulting
# to `<rig>/.gc/mined/<project-slug>/<date>/`.
#
# Typical setup:
#
#   mkdir ~/session-miner-demo && cd $_
#   git init
#   cp <repo>/examples/session-miner/city.toml .
#   # adjust the [[rigs]] path below to point at this repo
#   gc start .
#   # dispatch a mining run:
#   gc sling mining/miner_coordinator mol-session-mining --formula \
#     --var project_slug=-home-admin-workspace-ck3proj

[workspace]
name = "session-miner-demo"
provider = "claude"

# Shared test dolt server — managed by examples/session-miner/scripts/test-dolt.sh.
# This `[dolt]` section marks the server as external/user-managed so gc won't
# spawn a per-city dolt. Every test city that sets these to the same port
# will share one server (with separate databases). Default port is 13307;
# override via GC_TEST_DOLT_PORT before running test-dolt.sh start, and
# change the port below to match.
[dolt]
host = "127.0.0.1"
port = 13307

[[rigs]]
name = "mining"
# Adjust the path below to point at the git repo where outputs will land.
path = "."
includes = ["packs/session-miner"]
